<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Intro — NYC Footprints</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #d3d3d3;
      font-family: "Hanken Grotesk", sans-serif;
      color: #000000;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 24px;
      padding: 0 8px 0 8px;
      border-bottom: 1px solid #000000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-sizing: border-box;
      background: #d3d3d3;
    }

    .header-about {
      margin-left: auto;
      font-size: 0.6rem;
      font-family: "Hanken Grotesk", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #000000;
      text-decoration: none;
    }

    .header-about:hover {
      color: #444444;
    }

    header h1 {
      font-size: 0.6rem;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    header h1 a {
      color: #000000;
      text-decoration: none;
    }

    header h1 a:hover {
      color: #444444;
    }

    .intro-main {
      display: grid;
      grid-template-columns: minmax(0, 400px) 1fr;
      gap: 48px;
      padding: 8px;
      align-items: stretch;
      min-height: calc(100vh - 24px);
    }

    .intro-container {
      min-width: 0;
      max-width: 400px;
    }

    .intro-viz-panel {
      width: 200px;
      height: 200px;
      justify-self: center;
      align-self: center;
      border: 1px solid #000000;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
    }

    .intro-viz-panel img,
    .intro-viz-panel object {
      width: 80%;
      height: 80%;
      object-fit: contain;
    }

    .intro-viz-panel.bar-chart {
      width: 456px;
      height: 480px;
      padding: 8px;
      border: none;
    }

    .intro-viz-panel.bar-chart svg {
      width: 100%;
      height: 100%;
    }

    .intro-viz-panel.borough-preview {
      flex-direction: column;
      gap: 12px;
      height: auto;
      min-height: 200px;
      border: none;
    }

    .intro-viz-panel.borough-preview .borough-square {
      width: 200px;
      height: 200px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #000000;
    }

    .intro-viz-panel.borough-preview .borough-square object {
      width: 80%;
      height: 80%;
      object-fit: contain;
    }

    .intro-viz-panel.borough-preview .borough-caption {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: left;
      line-height: 1.3;
    }

    .intro-step {
      margin-bottom: 12px;
      transition: color 0.3s ease;
    }

    .intro-step.inactive {
      color: #969696;
    }

    .intro-step.active {
      color: #000000;
    }

    .intro-step .step-text {
      font-size: 0.6rem;
      line-height: 1.3;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .intro-step .step-prompt {
      font-size: 0.6rem;
      font-family: "Hanken Grotesk", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 12px;
    }

    .intro-step .step-viz {
      margin-top: 24px;
      margin-bottom: 16px;
    }

    a.back-link {
      display: inline-block;
      margin: 48px 8px 0;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #000000;
      text-decoration: none;
    }

    a.back-link:hover {
      color: #444444;
    }

    .intro-step .intro-link {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .intro-step.active .intro-link:hover {
      color: #444444;
      background: #FFFAB3;
      text-decoration: none;
    }

    ::selection {
      background: #c0c0c0;
    }
  </style>
</head>
<body>

<header>
  <h1><a href="index.html">NYC Footprints</a></h1>
  <a href="index.html#about" class="header-about">ABOUT</a>
</header>

<div class="intro-main">
  <div class="intro-container" id="intro-container"></div>
  <div class="intro-viz-panel" id="intro-viz-panel" role="img" aria-label="Footprint shape visualization"></div>
</div>
<a href="index.html" class="back-link" id="back-link" style="display: none;">← Back to NYC Footprints</a>

<script>
  const STEPS = [
    {
      text: "Our cities are mostly experienced vertically — skylines, heights, rooflines. But there's another dimension we rarely see with our own eyes: the city's footprint. How much ground each building takes up, and what shape it leaves on the earth. Let's take a look.",
      prompt: true,
      viz: null
    },
    {
      text: "This project deep dives into the building footprints of New York City, my home for the last two years and one of the most densely built places on earth.",
      prompt: true,
      viz: null
    },
    {
      text: "Across five boroughs, we have 1.08 million building footprints to analyze from 1652 to 2026 (Thank you NYC Open Data).",
      html: "Across five boroughs, we have 1.08 million building footprints to analyze from 1652 to 2026 (Thank you <a href='https://data.cityofnewyork.us/City-Government/Building-Footprints-Map-/jh45-qr5r' target='_blank' rel='noopener noreferrer' class='intro-link'>NYC Open Data</a>).",
      prompt: true,
      viz: null
    },
    {
      text: "Let's start by looking at the most common footprint shape — rectangle, L-shape, U-shape, or something weirder?",
      prompt: true,
      viz: null
    },
    {
      text: "Now that's kind of boring but expected right? What if you averaged all 1.08 million footprints into one?",
      prompt: true,
      viz: null
    },
    {
      text: "Okay that's a bit more interesting! Here's something I kept wondering while digging through this data: are footprints getting bigger over time, or smaller?",
      prompt: true,
      viz: null
    },
    {
      text: "The chart suggests a shift from small footprint urban development around the turn of the 20th century toward larger average footprints in postwar and especially recent decades. That matches shifts in urban form, land use, and how buildings get built.",
      prompt: true,
      viz: null
    },
    {
      text: "Now pick a borough, Your favorite one!",
      html: "Now pick a borough, Your favorite one!<br><a href='index.html?borough=2' class='intro-link' data-borough='bronx'>Bronx</a> / <a href='index.html?borough=3' class='intro-link' data-borough='brooklyn'>Brooklyn</a> / <a href='index.html?borough=1' class='intro-link' data-borough='manhattan'>Manhattan</a> / <a href='index.html?borough=4' class='intro-link' data-borough='queens'>Queens</a> / <a href='index.html?borough=5' class='intro-link' data-borough='staten-island'>Staten Island</a>.",
      prompt: true,
      viz: null
    },
    {
      text: "That's a glimpse into the hidden geometry of New York. Now go explore the concrete jungle on your own!",
      prompt: true,
      viz: null
    }
  ];

  let currentIndex = 0;
  let complete = false;
  let showSquare = false;
  let showAverageSquare = false;
  let showDecadeChart = false;
  let decadeData = null;
  let selectedBoroughPreview = null;
  const container = document.getElementById("intro-container");
  const vizPanel = document.getElementById("intro-viz-panel");
  const backLink = document.getElementById("back-link");

  function render() {
    container.innerHTML = "";
    for (let i = 0; i <= currentIndex; i++) {
      const step = STEPS[i];
      const isActive = i === currentIndex;
      const showPrompt = step.prompt && isActive && !complete;

      const block = document.createElement("div");
      block.className = "intro-step " + (isActive ? "active" : "inactive");

      const textEl = document.createElement("div");
      textEl.className = "step-text";
      if (step.html) {
        textEl.innerHTML = step.html;
      } else {
        textEl.textContent = step.text;
      }
      block.appendChild(textEl);

      if (step.viz) {
        const vizEl = document.createElement("div");
        vizEl.className = "step-viz";
        vizEl.innerHTML = step.viz;
        block.appendChild(vizEl);
      }

      if (showPrompt) {
        const promptEl = document.createElement("div");
        promptEl.className = "step-prompt";
        promptEl.textContent = "(↵ PRESS ENTER TO CONTINUE)";
        block.appendChild(promptEl);
      }

      container.appendChild(block);
    }

    backLink.style.display = complete ? "inline-block" : "none";

    if (currentIndex === 3 && showSquare) {
      vizPanel.style.visibility = "visible";
      vizPanel.style.pointerEvents = "auto";
      vizPanel.className = "intro-viz-panel";
      vizPanel.innerHTML = "<object data='assets/most-common-footprint.svg' type='image/svg+xml'></object>";
    } else if (currentIndex === 4 && showAverageSquare) {
      vizPanel.style.visibility = "visible";
      vizPanel.style.pointerEvents = "auto";
      vizPanel.className = "intro-viz-panel";
      vizPanel.innerHTML = "<object data='assets/average-footprint.svg' type='image/svg+xml'></object>";
    } else if ((currentIndex === 5 && showDecadeChart) || currentIndex === 6) {
      vizPanel.style.visibility = "visible";
      vizPanel.style.pointerEvents = "auto";
      vizPanel.className = "intro-viz-panel bar-chart";
      vizPanel.innerHTML = decadeData
        ? buildDecadeBarChart(decadeData)
        : "<div style='font-size:0.6rem;text-transform:uppercase;letter-spacing:0.06em'>Loading…</div>";
    } else if (currentIndex === 7 && selectedBoroughPreview) {
      vizPanel.style.visibility = "visible";
      vizPanel.style.pointerEvents = "auto";
      vizPanel.className = "intro-viz-panel borough-preview";
      vizPanel.innerHTML = "<div class='borough-square'><object data='assets/most-irregular-" + selectedBoroughPreview + ".svg' type='image/svg+xml'></object></div><div class='borough-caption'>Most irregular building shape (compactness ratio:<br>perimeter² / area)</div>";
    } else {
      vizPanel.style.visibility = "hidden";
      vizPanel.style.pointerEvents = "none";
      vizPanel.className = "intro-viz-panel";
      vizPanel.innerHTML = "";
    }
  }

  function buildDecadeBarChart(data) {
    const pad = { top: 12, right: 52, bottom: 24, left: 42 };
    const chartW = 456;
    const chartH = 480;
    const w = chartW - pad.left - pad.right;
    const h = chartH - pad.top - pad.bottom;
    const maxArea = Math.max(...data.map(d => d.avgArea));
    const barGap = 2;
    const barHeight = Math.max(2, (h - (data.length - 1) * barGap) / data.length);

    let path = "";
    for (let i = 0; i < data.length; i++) {
      const d = data[i];
      const y = pad.top + i * (barHeight + barGap);
      const barW = (d.avgArea / maxArea) * w;
      path += `M ${pad.left} ${y} L ${pad.left} ${y + barHeight} L ${pad.left + barW} ${y + barHeight} L ${pad.left + barW} ${y} Z `;
    }

    const textStyle = 'font-size="8px" font-family="Hanken Grotesk,sans-serif" letter-spacing="0.06em" text-transform="uppercase" fill="#000"';
    let labels = "";
    for (let i = 0; i < data.length; i++) {
      const d = data[i];
      const y = pad.top + i * (barHeight + barGap) + barHeight / 2;
      labels += `<text x="${pad.left - 6}" y="${y + 3}" ${textStyle} text-anchor="end">${d.decade}</text>`;
    }

    return `<svg viewBox="0 0 ${chartW} ${chartH}" xmlns="http://www.w3.org/2000/svg"><rect fill="transparent" width="${chartW}" height="${chartH}"/><path d="${path}" fill="#000000"/>${labels}<text x="${pad.left + w / 2}" y="${chartH - 4}" ${textStyle} text-anchor="middle">AVG SQ FT</text></svg>`;
  }

  function advance() {
    if (currentIndex === 3 && !showSquare) {
      showSquare = true;
      render();
    } else if (currentIndex === 3 && showSquare) {
      currentIndex++;
      showSquare = false;
      render();
    } else if (currentIndex === 4 && !showAverageSquare) {
      showAverageSquare = true;
      render();
    } else if (currentIndex === 4 && showAverageSquare) {
      currentIndex++;
      showAverageSquare = false;
      render();
    } else if (currentIndex === 5 && !showDecadeChart) {
      showDecadeChart = true;
      if (decadeData) {
        render();
      } else {
        fetch("data/decade-averages.json")
          .then(r => r.ok ? r.json() : Promise.reject(r.status))
          .then(d => { decadeData = d; render(); })
          .catch(() => { showDecadeChart = false; render(); });
      }
    } else if (currentIndex === 5 && showDecadeChart) {
      currentIndex++;
      render();
    } else if (currentIndex === 6) {
      currentIndex++;
      render();
    } else if (currentIndex === 7) {
      currentIndex++;
      render();
    } else if (currentIndex === 8) {
      window.location.href = "index.html";
    } else if (currentIndex < STEPS.length - 1) {
      currentIndex++;
      render();
    } else if (currentIndex === STEPS.length - 1) {
      complete = true;
      render();
    }
  }

  function retreat() {
    if (complete) {
      complete = false;
      render();
    } else if (currentIndex === 8) {
      currentIndex--;
      render();
    } else if (currentIndex === 7) {
      currentIndex--;
      render();
    } else if (currentIndex === 6) {
      currentIndex--;
      render();
    } else if (currentIndex === 5 && showDecadeChart) {
      showDecadeChart = false;
      render();
    } else if (currentIndex === 5 && !showDecadeChart) {
      currentIndex--;
      showAverageSquare = true;
      render();
    } else if (currentIndex === 4 && showAverageSquare) {
      showAverageSquare = false;
      render();
    } else if (currentIndex === 4 && !showAverageSquare) {
      currentIndex--;
      showSquare = true;
      render();
    } else if (currentIndex === 3 && showSquare) {
      showSquare = false;
      render();
    } else if (currentIndex > 0) {
      currentIndex--;
      render();
    }
  }

  container.addEventListener("click", (e) => {
    const link = e.target.closest("a.intro-link[data-borough]");
    if (!link || currentIndex !== 7) return;
    const borough = link.getAttribute("data-borough");
    if (selectedBoroughPreview === borough) {
      return; // allow default navigation
    }
    e.preventDefault();
    selectedBoroughPreview = borough;
    render();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === "ArrowDown" || e.key === "ArrowRight") {
      e.preventDefault();
      advance();
    } else if (e.key === "ArrowUp" || e.key === "ArrowLeft" || e.key === "Backspace") {
      e.preventDefault();
      retreat();
    }
  });

  render();
</script>
</body>
</html>
