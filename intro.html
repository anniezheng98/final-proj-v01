<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="assets/average-footprint.svg">
  <title>Intro — NYC Footprints</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #d3d3d3;
      font-family: "Hanken Grotesk", sans-serif;
      color: #000000;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 24px;
      max-height: 24px;
      padding: 0 8px 0 8px;
      border-bottom: 1px solid #000000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-sizing: border-box;
      background: #d3d3d3;
      line-height: 1;
      overflow: hidden;
    }

    .header-about {
      margin-left: auto;
      font-size: 0.65rem;
      font-family: "Hanken Grotesk", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1;
      color: #000000;
      text-decoration: none;
    }

    .header-about:hover {
      color: #444444;
    }

    header h1 {
      font-size: 0.65rem;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1;
    }

    header h1 a {
      color: #000000;
      text-decoration: none;
      line-height: inherit;
    }

    header h1 a:hover {
      color: #444444;
    }

    .intro-text-wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: calc(100vh - 24px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      box-sizing: border-box;
      pointer-events: none;
    }

    .intro-text-wrap .intro-container,
    .intro-text-wrap .back-link {
      pointer-events: auto;
    }

    .intro-container {
      min-width: 0;
      max-width: 450px;
      width: 100%;
      text-align: center;
    }

    #intro-float-root {
      position: fixed;
      top: 24px;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .intro-float-art {
      position: absolute;
      pointer-events: none;
      max-width: 100%;
      box-sizing: border-box;
    }

    .intro-float-art .intro-viz-panel.borough-preview {
      max-width: min(160px, 100%);
    }

    .intro-viz-panel {
      width: 160px;
      height: 160px;
      border: 1px solid #000000;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .intro-viz-panel img,
    .intro-viz-panel object {
      width: 80%;
      height: 80%;
      object-fit: contain;
    }

    .intro-viz-panel.borough-preview .borough-square.chart-bounds {
      width: 160px;
      height: 160px;
      max-width: min(160px, calc(100vw - 32px));
      max-height: min(160px, calc(100vh - 80px));
      padding: 4px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .intro-viz-panel.borough-preview .chart-bounds .bar-chart-inner {
      width: 100%;
      height: 100%;
      min-height: 0;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .intro-viz-panel.borough-preview .chart-bounds .bar-chart-inner svg {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      flex-shrink: 1;
      display: block;
    }

    .intro-viz-panel.borough-preview {
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      width: 160px;
      max-width: min(160px, calc(100vw - 32px));
      height: auto;
      min-width: 0;
      min-height: 0;
      box-sizing: border-box;
      border: none;
    }

    .intro-viz-panel.borough-preview .borough-square {
      width: 160px;
      height: 160px;
      max-width: min(160px, calc(100vw - 32px));
      max-height: min(160px, calc(100vh - 80px));
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #000000;
    }

    .intro-viz-panel.borough-preview .borough-square object {
      width: 80%;
      height: 80%;
      object-fit: contain;
    }

    .intro-viz-panel.borough-preview .borough-caption {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 1.3;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      overflow-wrap: break-word;
      word-wrap: break-word;
    }

    .intro-step {
      margin-bottom: 12px;
      transition: color 0.3s ease;
      text-align: center;
    }

    .intro-step.inactive {
      color: #969696;
    }

    .intro-step.active {
      color: #000000;
    }

    .intro-step .step-text {
      font-size: 0.65rem;
      line-height: 1.3;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      text-align: center;
    }

    .intro-step .step-prompt {
      font-size: 0.65rem;
      font-family: "Hanken Grotesk", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 12px;
      text-align: center;
    }

    .intro-step .step-viz {
      margin-top: 24px;
      margin-bottom: 16px;
    }

    a.back-link {
      display: inline-block;
      margin-top: 32px;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #000000;
      text-decoration: none;
      text-align: center;
    }

    a.back-link:hover {
      color: #444444;
    }

    .intro-step .intro-link {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .intro-step.active .intro-link:hover {
      color: #444444;
      background: #FFFAB3;
      text-decoration: none;
    }

    ::selection {
      background: #c0c0c0;
    }
  </style>
</head>
<body>

<header>
  <h1><a href="index.html?from=intro">NYC Footprints</a></h1>
  <a href="about.html" class="header-about">ABOUT</a>
</header>

<div id="intro-float-root" aria-hidden="true"></div>

<div class="intro-text-wrap">
  <div class="intro-container" id="intro-container"></div>
  <a href="index.html" class="back-link" id="back-link" style="display: none;">← Back to NYC Footprints</a>
</div>

<script>
  const STEPS = [
    {
      text: "Our cities are mostly experienced vertically — skylines, heights, rooflines. But there's another dimension we rarely see with our own eyes: the city's footprint. How much ground each building takes up, and what shape it leaves on the earth. Let's take a look.",
      prompt: true,
      viz: null
    },
    {
      text: "This project deep dives into the building footprints of New York City, my home for the last two years and one of the most densely built places on earth.",
      prompt: true,
      viz: null
    },
    {
      text: "Across five boroughs, we have 1.08 million building footprints to analyze from the years 1652 to 2026 (Thank you NYC Open Data).",
      html: "Across five boroughs, we have 1.08 million building footprints to analyze from the years 1652 to 2026 (Thank you <a href='https://data.cityofnewyork.us/City-Government/Building-Footprints-Map-/jh45-qr5r' target='_blank' rel='noopener noreferrer' class='intro-link'>NYC Open Data</a>).",
      prompt: true,
      viz: null
    },
    {
      text: "Let's start by looking at the most common footprint shape — rectangle, L-shape, U-shape, or something weirder?",
      prompt: true,
      viz: null
    },
    {
      text: "Now that's kind of boring but expected right? But what if you averaged all 1.08 million footprints into one?",
      prompt: true,
      viz: null
    },
    {
      text: "Okay that's a bit more interesting! Here's something I kept wondering while digging through this data: are footprints getting bigger over time, or smaller?",
      prompt: true,
      viz: null
    },
    {
      text: "The chart suggests a shift from small footprint urban development around the turn of the 20th century toward larger average footprints in postwar and especially recent decades. That matches shifts in urban form, land use, and how buildings get built.",
      prompt: true,
      viz: null
    },
    {
      text: "Now pick a borough, Your favorite one!",
      html: "Now pick a borough, Your favorite one!<br><a href='index.html?borough=2' class='intro-link' data-borough='bronx'>Bronx</a> / <a href='index.html?borough=3' class='intro-link' data-borough='brooklyn'>Brooklyn</a> / <a href='index.html?borough=1' class='intro-link' data-borough='manhattan'>Manhattan</a> / <a href='index.html?borough=4' class='intro-link' data-borough='queens'>Queens</a> / <a href='index.html?borough=5' class='intro-link' data-borough='staten-island'>Staten Island</a>.",
      prompt: true,
      viz: null
    },
    {
      text: "That's a glimpse into the hidden geometry of New York. Thanks for stopping by, now go explore the concrete jungle on your own!",
      prompt: true,
      viz: null
    }
  ];

  let currentIndex = 0;
  let complete = false;
  let showSquare = false;
  let showAverageSquare = false;
  let decadeData = null;
  let selectedBoroughPreview = null;
  const container = document.getElementById("intro-container");
  const floatRoot = document.getElementById("intro-float-root");
  const backLink = document.getElementById("back-link");

  const placedRects = [];
  const PLACE_GAP = 10;
  const BOROUGH_FLOAT_W = 160;
  const BOROUGH_FLOAT_H = 240;
  const CHART_FLOAT_W = 160;
  const CHART_FLOAT_H = 240;

  function rectsOverlap(a, b, gap) {
    const ax1 = a.left - gap, ax2 = a.left + a.w + gap;
    const ay1 = a.top - gap, ay2 = a.top + a.h + gap;
    const bx1 = b.left - gap, bx2 = b.left + b.w + gap;
    const by1 = b.top - gap, by2 = b.top + b.h + gap;
    return !(ax2 <= bx1 || bx2 <= ax1 || ay2 <= by1 || by2 <= ay1);
  }

  function getFloatLayerSize() {
    const r = floatRoot.getBoundingClientRect();
    return {
      w: Math.max(0, r.width),
      h: Math.max(0, r.height)
    };
  }

  function clampRectToLayer(rect, vw, vh, margin) {
    const maxW = Math.max(0, vw - 2 * margin);
    const maxH = Math.max(0, vh - 2 * margin);
    const w = Math.max(1, Math.min(rect.w, maxW));
    const h = Math.max(1, Math.min(rect.h, maxH));
    const maxLeft = margin + Math.max(0, maxW - w);
    const maxTop = margin + Math.max(0, maxH - h);
    const left = Math.min(Math.max(margin, rect.left), maxLeft);
    const top = Math.min(Math.max(margin, rect.top), maxTop);
    return { left, top, w, h };
  }

  function mergeRectsBounding(rects) {
    if (!rects.length) return null;
    let x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
    for (const r of rects) {
      x1 = Math.min(x1, r.left);
      y1 = Math.min(y1, r.top);
      x2 = Math.max(x2, r.left + r.w);
      y2 = Math.max(y2, r.top + r.h);
    }
    return { left: x1, top: y1, w: x2 - x1, h: y2 - y1 };
  }

  function getTextExclusionRects() {
    const { w: vw, h: vh } = getFloatLayerSize();
    const fr = floatRoot.getBoundingClientRect();
    const pad = 20;
    const parts = [];
    const container = document.getElementById("intro-container");
    if (container) {
      const r = container.getBoundingClientRect();
      parts.push({
        left: r.left - fr.left - pad,
        top: r.top - fr.top - pad,
        w: r.width + 2 * pad,
        h: r.height + 2 * pad
      });
    }
    const back = document.getElementById("back-link");
    if (back && back.offsetParent !== null && back.style.display !== "none") {
      const r = back.getBoundingClientRect();
      parts.push({
        left: r.left - fr.left - pad,
        top: r.top - fr.top - pad,
        w: r.width + 2 * pad,
        h: r.height + 2 * pad
      });
    }
    const minW = Math.min(vw * 0.92, 450);
    const minH = vh * 0.65;
    parts.push({
      left: (vw - minW) / 2,
      top: (vh - minH) / 2,
      w: minW,
      h: minH
    });
    const merged = mergeRectsBounding(parts);
    return merged ? [merged] : [];
  }

  function tryPlaceRect(w, h, gap) {
    const { w: vw, h: vh } = getFloatLayerSize();
    const margin = 12;
    const maxW = Math.max(0, vw - 2 * margin);
    const maxH = Math.max(0, vh - 2 * margin);
    const wClamped = Math.min(w, maxW);
    const hClamped = Math.min(h, maxH);
    if (wClamped < 1 || hClamped < 1 || maxW < 1 || maxH < 1) {
      return { left: margin, top: margin, w: Math.max(1, wClamped), h: Math.max(1, hClamped) };
    }
    const maxLeft = vw - wClamped - 2 * margin;
    const maxTop = vh - hClamped - 2 * margin;
    if (maxLeft < 0 || maxTop < 0) {
      return { left: margin, top: margin, w: wClamped, h: hClamped };
    }
    const textBlocks = getTextExclusionRects();
    const blocked = textBlocks.concat(placedRects);
    function clearOfBlocked(rect) {
      return blocked.every(p => !rectsOverlap(rect, p, gap));
    }
    for (let attempt = 0; attempt < 450; attempt++) {
      const left = margin + Math.random() * maxLeft;
      const top = margin + Math.random() * maxTop;
      const rect = { left, top, w: wClamped, h: hClamped };
      if (clearOfBlocked(rect)) {
        return rect;
      }
    }
    const golden = 2.39996322972865332;
    for (let attempt = 0; attempt < 200; attempt++) {
      const t = attempt * golden;
      const r = 18 + Math.sqrt(attempt + 1) * 22;
      const cx = margin + maxLeft / 2;
      const cy = margin + maxTop / 2;
      let left = cx + Math.cos(t) * r - wClamped / 2;
      let top = cy + Math.sin(t) * r - hClamped / 2;
      left = Math.min(Math.max(margin, left), margin + maxLeft);
      top = Math.min(Math.max(margin, top), margin + maxTop);
      const rect = { left, top, w: wClamped, h: hClamped };
      if (clearOfBlocked(rect)) {
        return rect;
      }
    }
    for (let gy = 0; gy < 6; gy++) {
      for (let gx = 0; gx < 6; gx++) {
        const left = margin + (gx / 5) * maxLeft;
        const top = margin + (gy / 5) * maxTop;
        const rect = { left, top, w: wClamped, h: hClamped };
        if (clearOfBlocked(rect)) {
          return rect;
        }
      }
    }
    const lastChance = [
      { left: vw - wClamped - margin, top: vh - hClamped - margin },
      { left: vw - wClamped - margin, top: margin },
      { left: margin, top: vh - hClamped - margin },
      { left: margin, top: margin }
    ];
    for (const p of lastChance) {
      const left = Math.min(Math.max(margin, p.left), margin + Math.max(0, maxLeft));
      const top = Math.min(Math.max(margin, p.top), margin + Math.max(0, maxTop));
      const rect = { left, top, w: wClamped, h: hClamped };
      if (clearOfBlocked(rect)) {
        return rect;
      }
    }
    return { left: margin, top: margin, w: wClamped, h: hClamped };
  }

  function clearFloatLayer() {
    floatRoot.innerHTML = "";
    placedRects.length = 0;
  }

  function addFloatSlot(html, w, h) {
    const { w: vw, h: vh } = getFloatLayerSize();
    const margin = 12;
    const raw = tryPlaceRect(w, h, PLACE_GAP);
    const rect = clampRectToLayer(raw, vw, vh, margin);
    placedRects.push({ left: rect.left, top: rect.top, w: rect.w, h: rect.h });
    const wrap = document.createElement("div");
    wrap.className = "intro-float-art";
    wrap.style.left = rect.left + "px";
    wrap.style.top = rect.top + "px";
    wrap.setAttribute("role", "img");
    wrap.innerHTML = html;
    floatRoot.appendChild(wrap);
  }

  function render() {
    container.innerHTML = "";
    const step = complete ? STEPS[STEPS.length - 1] : STEPS[currentIndex];
    const showPrompt = !complete && step.prompt;

    const block = document.createElement("div");
    block.className = "intro-step active";

    const textEl = document.createElement("div");
    textEl.className = "step-text";
    if (step.html) {
      textEl.innerHTML = step.html;
    } else {
      textEl.textContent = step.text;
    }
    block.appendChild(textEl);

    if (step.viz) {
      const vizEl = document.createElement("div");
      vizEl.className = "step-viz";
      vizEl.innerHTML = step.viz;
      block.appendChild(vizEl);
    }

    if (showPrompt) {
      const promptEl = document.createElement("div");
      promptEl.className = "step-prompt";
      promptEl.textContent = "(↵ PRESS ENTER TO CONTINUE)";
      block.appendChild(promptEl);
    }

    container.appendChild(block);

    backLink.style.display = complete ? "inline-block" : "none";

    clearFloatLayer();

    if (currentIndex === 3 && showSquare) {
      addFloatSlot(
        "<div class=\"intro-viz-panel borough-preview\"><div class=\"borough-square\"><object data=\"assets/most-common-footprint.svg\" type=\"image/svg+xml\"></object></div><div class=\"borough-caption\">Most common footprint shape</div></div>",
        BOROUGH_FLOAT_W,
        BOROUGH_FLOAT_H
      );
    } else if (currentIndex === 4 && showAverageSquare) {
      addFloatSlot(
        "<div class=\"intro-viz-panel borough-preview\"><div class=\"borough-square\"><object data=\"assets/average-footprint.svg\" type=\"image/svg+xml\"></object></div><div class=\"borough-caption\">Average shape of all footprints</div></div>",
        BOROUGH_FLOAT_W,
        BOROUGH_FLOAT_H
      );
    } else if (currentIndex === 6) {
      const { w: fw, h: fh } = getFloatLayerSize();
      const chartW = Math.min(CHART_FLOAT_W, Math.max(80, fw - 32));
      const chartH = Math.min(CHART_FLOAT_H, Math.max(80, fh - 32));
      const chartInner = decadeData
        ? buildDecadeBarChart(decadeData)
        : "<div style=\"font-size:0.65rem;text-transform:uppercase;letter-spacing:0.06em\">Loading…</div>";
      addFloatSlot(
        "<div class=\"intro-viz-panel borough-preview\"><div class=\"borough-square chart-bounds\"><div class=\"bar-chart-inner\">" + chartInner + "</div></div><div class=\"borough-caption\">AVG SQ FT FROM 1650 to 2020</div></div>",
        chartW,
        chartH
      );
    } else if (currentIndex === 7 && selectedBoroughPreview) {
      addFloatSlot(
        "<div class=\"intro-viz-panel borough-preview\"><div class=\"borough-square\"><object data=\"assets/most-irregular-" + selectedBoroughPreview + ".svg\" type=\"image/svg+xml\"></object></div><div class=\"borough-caption\">Most irregular building shape (compactness ratio:<br>perimeter² / area)</div></div>",
        BOROUGH_FLOAT_W,
        BOROUGH_FLOAT_H
      );
    }
  }

  function buildDecadeBarChart(data) {
    const pad = { top: 14, right: 14, bottom: 14, left: 14 };
    const chartW = 456;
    const chartH = 480;
    const w = chartW - pad.left - pad.right;
    const h = chartH - pad.top - pad.bottom;
    const maxArea = Math.max(...data.map(d => d.avgArea));
    const barGap = 2;
    const barHeight = Math.max(2, (h - (data.length - 1) * barGap) / data.length);

    let path = "";
    for (let i = 0; i < data.length; i++) {
      const d = data[i];
      const y = pad.top + i * (barHeight + barGap);
      const barW = (d.avgArea / maxArea) * w;
      path += `M ${pad.left} ${y} L ${pad.left} ${y + barHeight} L ${pad.left + barW} ${y + barHeight} L ${pad.left + barW} ${y} Z `;
    }

    return `<svg viewBox="0 0 ${chartW} ${chartH}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"><rect fill="transparent" width="${chartW}" height="${chartH}"/><path d="${path}" fill="#000000"/></svg>`;
  }

  function advance() {
    if (currentIndex === 3 && !showSquare) {
      showSquare = true;
      render();
    } else if (currentIndex === 3 && showSquare) {
      currentIndex++;
      showSquare = false;
      render();
    } else if (currentIndex === 4 && !showAverageSquare) {
      showAverageSquare = true;
      render();
    } else if (currentIndex === 4 && showAverageSquare) {
      currentIndex++;
      showAverageSquare = false;
      render();
    } else if (currentIndex === 5) {
      currentIndex++;
      if (!decadeData) {
        fetch("data/decade-averages.json")
          .then(r => r.ok ? r.json() : Promise.reject(r.status))
          .then(d => { decadeData = d; render(); })
          .catch(() => { decadeData = null; render(); });
      }
      render();
    } else if (currentIndex === 6) {
      currentIndex++;
      render();
    } else if (currentIndex === 7) {
      currentIndex++;
      render();
    } else if (currentIndex === 8) {
      sessionStorage.setItem("intro_seen", "1");
      window.location.href = "index.html";
    } else if (currentIndex < STEPS.length - 1) {
      currentIndex++;
      render();
    } else if (currentIndex === STEPS.length - 1) {
      complete = true;
      render();
    }
  }

  function retreat() {
    if (complete) {
      complete = false;
      render();
    } else if (currentIndex === 8) {
      currentIndex--;
      render();
    } else if (currentIndex === 7) {
      currentIndex--;
      render();
    } else if (currentIndex === 6) {
      currentIndex--;
      render();
    } else if (currentIndex === 5) {
      currentIndex--;
      showAverageSquare = true;
      render();
    } else if (currentIndex === 4 && showAverageSquare) {
      showAverageSquare = false;
      render();
    } else if (currentIndex === 4 && !showAverageSquare) {
      currentIndex--;
      showSquare = true;
      render();
    } else if (currentIndex === 3 && showSquare) {
      showSquare = false;
      render();
    } else if (currentIndex > 0) {
      currentIndex--;
      render();
    }
  }

  container.addEventListener("click", (e) => {
    const link = e.target.closest("a.intro-link[data-borough]");
    if (!link || currentIndex !== 7) return;
    const borough = link.getAttribute("data-borough");
    if (selectedBoroughPreview === borough) {
      return; // allow default navigation
    }
    e.preventDefault();
    selectedBoroughPreview = borough;
    render();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === "ArrowDown" || e.key === "ArrowRight") {
      e.preventDefault();
      advance();
    } else if (e.key === "ArrowUp" || e.key === "ArrowLeft" || e.key === "Backspace") {
      e.preventDefault();
      retreat();
    }
  });

  render();
</script>
</body>
</html>
